<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Visualizer</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e0e0e8;
            --text-dim: #8888a0;
            --accent: #4a9eff;
            --accent2: #ff6b6b;
            --accent3: #51cf66;
            --accent4: #ffd43b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 2rem;
        }
        header h1 { font-size: 1.3rem; font-weight: 600; }
        header .swimmer-info { color: var(--text-dim); font-size: 0.85rem; }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            font-size: 0.85rem;
            font-family: inherit;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            transition: color 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .view { display: none; padding: 1.5rem 2rem; }
        .view.active { display: block; }

        /* ===== View 1: Timeline Explorer ===== */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar label { color: var(--text-dim); font-size: 0.8rem; }
        .filter-bar select, .filter-bar button {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .filter-bar select:hover, .filter-bar button:hover {
            border-color: var(--accent);
        }
        .event-btn {
            padding: 0.3rem 0.7rem;
            border-radius: 3px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
        }
        .event-btn.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .event-btn:hover { border-color: var(--accent); }

        #timeline-chart { width: 100%; height: 500px; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }
        .stat-card h3 {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }
        .stat-card .value {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .stat-card .detail { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.3rem; }

        /* ===== View 2: Heatmap Dashboard ===== */
        #heatmap-chart { width: 100%; height: 600px; }
        .pb-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.8rem;
        }
        .pb-table th, .pb-table td {
            padding: 0.5rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .pb-table th {
            color: var(--text-dim);
            font-weight: 500;
            position: sticky;
            top: 0;
            background: var(--bg);
        }
        .pb-table tr:hover { background: var(--surface); }
        .pb-badge {
            display: inline-block;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .pb-badge.scm { background: #1a3a5c; color: #4a9eff; }
        .pb-badge.lcm { background: #1a4a2a; color: #51cf66; }

        /* ===== View 3: Small Multiples ===== */
        .sm-chart { width: 100%; height: 220px; }

        /* ===== Meet Log ===== */
        .meet-log { margin-top: 1.5rem; }
        .meet-entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .meet-entry h3 { font-size: 0.9rem; margin-bottom: 0.3rem; }
        .meet-entry .meta { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.5rem; }
        .meet-entry .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.5rem;
        }
        .meet-event-chip {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0.6rem;
            background: var(--bg);
            border-radius: 3px;
            font-size: 0.75rem;
        }
        .meet-event-chip .imp-pos { color: var(--accent2); }
        .meet-event-chip .imp-neg { color: var(--accent3); }
    </style>
</head>
<body>
    <header>
        <h1 id="swimmer-name">Swim Visualizer</h1>
        <span class="swimmer-info" id="swimmer-team"></span>
        <span class="swimmer-info" id="swimmer-stats"></span>
    </header>

    <div class="tabs">
        <button class="tab active" data-view="timeline">Timeline Explorer</button>
        <button class="tab" data-view="heatmap">Activity Heatmap</button>
        <button class="tab" data-view="progress">Small Multiples</button>
    </div>

    <!-- ===== VIEW 1: Timeline Explorer ===== -->
    <div class="view active" id="view-timeline">
        <div class="filter-bar">
            <label>Course:</label>
            <select id="course-filter">
                <option value="all">All</option>
                <option value="LCM">LCM (50m)</option>
                <option value="SCM">SCM (25m)</option>
            </select>
            <label>Stroke:</label>
            <select id="stroke-filter">
                <option value="all">All</option>
                <option value="Free">Free</option>
                <option value="Breast">Breast</option>
                <option value="Fly">Fly</option>
                <option value="Back">Back</option>
                <option value="IM">IM</option>
            </select>
            <label>Events:</label>
            <div id="event-buttons"></div>
        </div>
        <div id="timeline-chart"></div>
        <div class="stats-row" id="event-stats"></div>
    </div>

    <!-- ===== VIEW 2: Activity Heatmap ===== -->
    <div class="view" id="view-heatmap">
        <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 1rem;">
            Each cell shows the time swum. Filled cells = event was raced at that meet. Hover for details.
        </p>
        <div id="heatmap-chart"></div>
        <h2 style="font-size: 1rem; margin-top: 1.5rem; margin-bottom: 0.75rem;">Personal Bests & Stats</h2>
        <table class="pb-table" id="pb-table">
            <thead>
                <tr>
                    <th>Event</th>
                    <th>PB</th>
                    <th>Meet</th>
                    <th>Date</th>
                    <th>Swims</th>
                    <th>Days Since Last</th>
                    <th>Trend</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ===== VIEW 3: Small Multiples ===== -->
    <div class="view" id="view-progress">
        <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 0.5rem;">
            One chart per event. Time drops down = faster. Events with 2+ swims shown.
        </p>
        <div id="small-multiples-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem;"></div>
        <h2 style="font-size: 1rem; margin-top: 1.5rem; margin-bottom: 0.75rem;">Meet Log</h2>
        <div class="meet-log" id="meet-log"></div>
    </div>

    <script>
    // ===== DATA & INIT =====
    let DATA = null;

    // Event sort order: Free, Breast, Fly, Back, IM; then 50-100-200; SCM before LCM
    const STROKE_ORDER = { 'Free': 0, 'Breast': 1, 'Fly': 2, 'Back': 3, 'IM': 4 };
    const COURSE_ORDER = { 'SCM': 0, 'LCM': 1, 'SCY': 2 };

    function eventSortKey(eventName) {
        // e.g. "50 Free SCM" -> [0, 50, 0]
        const parts = eventName.split(' ');
        const dist = parseInt(parts[0]) || 0;
        const stroke = parts[1] || '';
        const course = parts[2] || '';
        return [
            STROKE_ORDER[stroke] ?? 99,
            dist,
            COURSE_ORDER[course] ?? 99,
        ];
    }

    function sortEvents(eventList) {
        return [...eventList].sort((a, b) => {
            const ka = eventSortKey(a);
            const kb = eventSortKey(b);
            for (let i = 0; i < 3; i++) {
                if (ka[i] !== kb[i]) return ka[i] - kb[i];
            }
            return 0;
        });
    }

    async function init() {
        const resp = await fetch('data/swim_data.json');
        DATA = await resp.json();

        // Sort events_list with custom order
        DATA.events_list = sortEvents(DATA.events_list);

        document.getElementById('swimmer-name').textContent = DATA.swimmer.name;
        document.getElementById('swimmer-team').textContent = `${DATA.swimmer.team} | ${DATA.swimmer.location}`;
        document.getElementById('swimmer-stats').textContent =
            `${DATA.meets.length} meets | ${Object.keys(DATA.event_series).length} events | ${DATA.meets[0].date} to ${DATA.meets[DATA.meets.length-1].date}`;

        setupTabs();
        renderTimeline();
        renderHeatmap();
        renderSmallMultiples();
        renderMeetLog();
    }

    function setupTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`view-${tab.dataset.view}`).classList.add('active');
                if (tab.dataset.view === 'heatmap') Plotly.Plots.resize('heatmap-chart');
                if (tab.dataset.view === 'timeline') Plotly.Plots.resize('timeline-chart');
                // Small multiples need individual resizes
                if (tab.dataset.view === 'progress') {
                    document.querySelectorAll('.sm-chart').forEach(el => Plotly.Plots.resize(el));
                }
            });
        });
    }

    // ===== UTILITIES =====
    function secondsToTime(s) {
        if (s >= 60) {
            const mins = Math.floor(s / 60);
            const secs = s - mins * 60;
            return `${mins}:${secs < 10 ? '0' : ''}${secs.toFixed(2)}`;
        }
        return s.toFixed(2);
    }

    function daysBetween(d1, d2) {
        return Math.round((new Date(d2) - new Date(d1)) / (1000 * 60 * 60 * 24));
    }

    const STROKE_COLORS = {
        'Free': '#4a9eff',
        'Breast': '#ff6b6b',
        'Fly': '#ffd43b',
        'Back': '#51cf66',
        'IM': '#cc5de8',
    };

    function eventColor(eventName) {
        for (const [stroke, color] of Object.entries(STROKE_COLORS)) {
            if (eventName.includes(stroke)) return color;
        }
        return '#4a9eff';
    }

    const COLORS = [
        '#4a9eff', '#ff6b6b', '#51cf66', '#ffd43b', '#cc5de8',
        '#ff922b', '#20c997', '#f06595', '#7950f2', '#15aabf',
        '#94d82d', '#fd7e14', '#e599f7', '#74c0fc', '#ffa8a8'
    ];

    const PLOTLY_LAYOUT = {
        paper_bgcolor: '#0f1117',
        plot_bgcolor: '#1a1d27',
        font: { family: 'SF Mono, Fira Code, Consolas, monospace', color: '#e0e0e8', size: 11 },
        margin: { t: 30, r: 30, b: 50, l: 70 },
        xaxis: {
            gridcolor: '#2a2d3a',
            linecolor: '#2a2d3a',
        },
        yaxis: {
            gridcolor: '#2a2d3a',
            linecolor: '#2a2d3a',
        },
        legend: {
            bgcolor: 'rgba(26,29,39,0.8)',
            bordercolor: '#2a2d3a',
            borderwidth: 1,
        },
        hovermode: 'closest',
    };

    // ===== VIEW 1: TIMELINE EXPLORER =====
    let selectedEvents = new Set();

    function renderTimeline() {
        const container = document.getElementById('event-buttons');
        const courseFilter = document.getElementById('course-filter');
        const strokeFilter = document.getElementById('stroke-filter');

        function getFilteredEvents() {
            const course = courseFilter.value;
            const stroke = strokeFilter.value;
            return DATA.events_list.filter(e => {
                if (course !== 'all' && !e.includes(course)) return false;
                if (stroke !== 'all' && !e.includes(stroke)) return false;
                return true;
            });
        }

        function renderButtons() {
            const events = getFilteredEvents();
            container.innerHTML = '';
            events.forEach(ev => {
                const btn = document.createElement('button');
                btn.className = 'event-btn' + (selectedEvents.has(ev) ? ' selected' : '');
                btn.textContent = ev;
                btn.onclick = () => {
                    if (selectedEvents.has(ev)) selectedEvents.delete(ev);
                    else selectedEvents.add(ev);
                    btn.classList.toggle('selected');
                    updateChart();
                };
                container.appendChild(btn);
            });
            if (selectedEvents.size === 0 && events.length > 0) {
                events.slice(0, 2).forEach(e => selectedEvents.add(e));
                renderButtons();
            }
        }

        function updateChart() {
            const traces = [];
            let colorIdx = 0;

            selectedEvents.forEach(eventName => {
                const series = DATA.event_series[eventName];
                if (!series) return;

                const color = COLORS[colorIdx % COLORS.length];
                colorIdx++;

                traces.push({
                    x: series.map(s => s.date),
                    y: series.map(s => s.time_seconds),
                    text: series.map(s =>
                        `<b>${eventName}</b><br>${s.time}<br>${s.meet}<br>${s.date}` +
                        (s.place ? `<br>${s.place} place` : '') +
                        (s.improvement ? `<br>Imp: ${s.improvement}` : '')
                    ),
                    hovertemplate: '%{text}<extra></extra>',
                    mode: 'lines+markers',
                    name: eventName,
                    line: { color, width: 2 },
                    marker: { color, size: 8 },
                });

                // PB reference line
                const pb = Math.min(...series.map(s => s.time_seconds));
                traces.push({
                    x: [series[0].date, series[series.length - 1].date],
                    y: [pb, pb],
                    mode: 'lines',
                    name: `${eventName} PB`,
                    line: { color, width: 1, dash: 'dot' },
                    showlegend: false,
                    hoverinfo: 'skip',
                });
            });

            const layout = {
                ...PLOTLY_LAYOUT,
                xaxis: {
                    ...PLOTLY_LAYOUT.xaxis,
                    type: 'date',
                    title: 'Date',
                },
                yaxis: {
                    ...PLOTLY_LAYOUT.yaxis,
                    title: 'Time (seconds)',
                    tickformat: '.1f',
                },
                showlegend: true,
            };

            Plotly.newPlot('timeline-chart', traces, layout, { responsive: true });
            updateStats();
        }

        function updateStats() {
            const container = document.getElementById('event-stats');
            container.innerHTML = '';
            const today = new Date();

            selectedEvents.forEach(eventName => {
                const series = DATA.event_series[eventName];
                if (!series) return;

                const pb = series.reduce((min, s) => s.time_seconds < min.time_seconds ? s : min, series[0]);
                const latest = series[series.length - 1];
                const first = series[0];
                const daysSinceLast = daysBetween(latest.date, today.toISOString().slice(0, 10));
                const totalDrop = (first.time_seconds - pb.time_seconds).toFixed(2);

                container.innerHTML += `
                    <div class="stat-card">
                        <h3>${eventName}</h3>
                        <div class="value">${pb.time}</div>
                        <div class="detail">PB at ${pb.meet} (${pb.date})</div>
                        <div class="detail">${series.length} swims | ${daysSinceLast}d since last | dropped ${totalDrop}s total</div>
                        <div class="detail">First: ${first.time} (${first.date}) | Latest: ${latest.time} (${latest.date})</div>
                    </div>
                `;
            });
        }

        courseFilter.onchange = () => { selectedEvents.clear(); renderButtons(); updateChart(); };
        strokeFilter.onchange = () => { selectedEvents.clear(); renderButtons(); updateChart(); };

        renderButtons();
        updateChart();
    }

    // ===== VIEW 2: ACTIVITY HEATMAP =====
    function renderHeatmap() {
        const events = DATA.events_list;
        const meets = DATA.meets;

        // Use simple categorical encoding: 1 = swam it, null = didn't
        // Annotations show the actual time
        const z = [];
        const hoverText = [];
        const annotations = [];

        events.forEach((ev, yi) => {
            const row = [];
            const hoverRow = [];
            const strokeColor = eventColor(ev);

            meets.forEach((meet, xi) => {
                const result = meet.events.find(e => e.event === ev);
                if (result) {
                    // Encode stroke type as value for coloring
                    const strokeIdx = STROKE_ORDER[ev.split(' ')[1]] ?? 0;
                    row.push(strokeIdx + 1);
                    hoverRow.push(
                        `<b>${ev}</b><br><b>${result.time}</b><br>${meet.name}<br>${meet.date}` +
                        (result.place ? `<br>${result.place}` : '') +
                        (result.improvement ? `<br>Imp: ${result.improvement}` : '')
                    );
                    // Add time as annotation
                    annotations.push({
                        x: meet.date,
                        y: ev,
                        text: result.time,
                        showarrow: false,
                        font: { color: '#fff', size: 9, family: 'SF Mono, monospace' },
                    });
                } else {
                    row.push(null);
                    hoverRow.push('');
                }
            });

            z.push(row);
            hoverText.push(hoverRow);
        });

        const trace = {
            z: z,
            x: meets.map(m => m.date),
            y: events,
            type: 'heatmap',
            colorscale: [
                [0, '#1a3a5c'],    // Free (blue)
                [0.2, '#1a3a5c'],
                [0.2, '#5c1a1a'],  // Breast (red)
                [0.4, '#5c1a1a'],
                [0.4, '#5c5c1a'],  // Fly (yellow)
                [0.6, '#5c5c1a'],
                [0.6, '#1a5c2a'],  // Back (green)
                [0.8, '#1a5c2a'],
                [0.8, '#3a1a5c'],  // IM (purple)
                [1.0, '#3a1a5c'],
            ],
            zmin: 0.5,
            zmax: 5.5,
            showscale: false,
            hoverongaps: false,
            text: hoverText,
            hovertemplate: '%{text}<extra></extra>',
            connectgaps: false,
            xgap: 2,
            ygap: 2,
        };

        const layout = {
            ...PLOTLY_LAYOUT,
            annotations: annotations,
            xaxis: {
                ...PLOTLY_LAYOUT.xaxis,
                type: 'date',
                title: '',
                dtick: 'M3',
            },
            yaxis: {
                ...PLOTLY_LAYOUT.yaxis,
                title: '',
            },
            margin: { t: 20, r: 30, b: 60, l: 140 },
        };

        Plotly.newPlot('heatmap-chart', [trace], layout, { responsive: true });
        renderPBTable();
    }

    function renderPBTable() {
        const tbody = document.querySelector('#pb-table tbody');
        const today = new Date();
        const rows = [];

        DATA.events_list.forEach(ev => {
            const series = DATA.event_series[ev];
            if (!series) return;

            const pb = series.reduce((min, s) => s.time_seconds < min.time_seconds ? s : min, series[0]);
            const latest = series[series.length - 1];
            const daysSince = daysBetween(latest.date, today.toISOString().slice(0, 10));
            const first = series[0];
            const totalDrop = (first.time_seconds - pb.time_seconds).toFixed(2);

            let trend = '---';
            if (series.length >= 2) {
                const prev = series[series.length - 2];
                const diff = latest.time_seconds - prev.time_seconds;
                if (diff < -0.1) trend = `<span style="color:var(--accent3)">&darr; ${(-diff).toFixed(2)}s</span>`;
                else if (diff > 0.1) trend = `<span style="color:var(--accent2)">&uarr; ${diff.toFixed(2)}s</span>`;
                else trend = `<span style="color:var(--text-dim)">&harr;</span>`;
            }

            const course = ev.includes('SCM') ? 'scm' : 'lcm';
            rows.push(`
                <tr>
                    <td><span class="pb-badge ${course}">${course.toUpperCase()}</span> ${ev}</td>
                    <td><b>${pb.time}</b></td>
                    <td>${pb.meet}</td>
                    <td>${pb.date}</td>
                    <td>${series.length}</td>
                    <td>${daysSince}d</td>
                    <td>${trend}</td>
                </tr>
            `);
        });

        tbody.innerHTML = rows.join('');
    }

    // ===== VIEW 3: SMALL MULTIPLES =====
    function renderSmallMultiples() {
        const grid = document.getElementById('small-multiples-grid');
        grid.innerHTML = '';

        // Show events with 2+ swims
        const qualifiedEvents = DATA.events_list.filter(ev => {
            const series = DATA.event_series[ev];
            return series && series.length >= 2;
        });

        const today = new Date();

        qualifiedEvents.forEach((ev, idx) => {
            const series = DATA.event_series[ev];
            const color = eventColor(ev);
            const pb = series.reduce((min, s) => s.time_seconds < min.time_seconds ? s : min, series[0]);
            const first = series[0];
            const latest = series[series.length - 1];
            const totalDrop = (first.time_seconds - pb.time_seconds).toFixed(2);
            const daysSince = daysBetween(latest.date, today.toISOString().slice(0, 10));

            // Create container
            const card = document.createElement('div');
            card.style.cssText = 'background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem;';
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.25rem;">
                    <span style="font-size: 0.85rem; font-weight: 600; color: ${color};">${ev}</span>
                    <span style="font-size: 0.75rem; color: var(--text-dim);">PB ${pb.time} | ${series.length} swims | ${daysSince}d ago</span>
                </div>
                <div style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.5rem;">
                    ${first.time} &rarr; ${latest.time} (dropped ${totalDrop}s)
                </div>
                <div id="sm-chart-${idx}" class="sm-chart"></div>
            `;
            grid.appendChild(card);

            // Render mini chart
            const trace = {
                x: series.map(s => s.date),
                y: series.map(s => s.time_seconds),
                text: series.map(s =>
                    `<b>${s.time}</b><br>${s.meet}<br>${s.date}` +
                    (s.place ? `<br>${s.place}` : '')
                ),
                hovertemplate: '%{text}<extra></extra>',
                mode: 'lines+markers',
                line: { color, width: 2 },
                marker: {
                    color: series.map(s => s.time_seconds === pb.time_seconds ? '#fff' : color),
                    size: series.map(s => s.time_seconds === pb.time_seconds ? 10 : 6),
                    line: {
                        color: series.map(s => s.time_seconds === pb.time_seconds ? color : 'transparent'),
                        width: series.map(s => s.time_seconds === pb.time_seconds ? 2 : 0),
                    },
                },
                fill: 'tozeroy',
                fillcolor: color.replace(')', ', 0.08)').replace('rgb', 'rgba').replace('#', ''),
            };

            // Compute fill color from hex
            const hexToRgba = (hex, alpha) => {
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                return `rgba(${r},${g},${b},${alpha})`;
            };
            trace.fillcolor = hexToRgba(color, 0.08);

            const layout = {
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent',
                font: { family: 'SF Mono, monospace', color: '#8888a0', size: 9 },
                margin: { t: 5, r: 10, b: 25, l: 50 },
                xaxis: {
                    gridcolor: '#2a2d3a',
                    linecolor: '#2a2d3a',
                    type: 'date',
                    tickformat: '%b %y',
                },
                yaxis: {
                    gridcolor: '#2a2d3a',
                    linecolor: '#2a2d3a',
                    tickformat: '.1f',
                },
                showlegend: false,
                hovermode: 'closest',
            };

            Plotly.newPlot(`sm-chart-${idx}`, [trace], layout, {
                responsive: true,
                displayModeBar: false,
            });
        });
    }

    // ===== MEET LOG =====
    function renderMeetLog() {
        const container = document.getElementById('meet-log');
        const meets = [...DATA.meets].reverse();

        container.innerHTML = meets.map(meet => {
            // Sort meet events with the same custom order
            const sortedEvents = [...meet.events].sort((a, b) => {
                const ka = eventSortKey(a.event);
                const kb = eventSortKey(b.event);
                for (let i = 0; i < 3; i++) {
                    if (ka[i] !== kb[i]) return ka[i] - kb[i];
                }
                return 0;
            });

            const eventsHtml = sortedEvents.map(e => {
                const impClass = e.improvement
                    ? (e.improvement.startsWith('+') ? 'imp-pos' : 'imp-neg')
                    : '';
                const impText = e.improvement || '';
                return `<div class="meet-event-chip">
                    <span>${e.event} ${e.time}</span>
                    <span class="${impClass}">${impText} ${e.place || ''}</span>
                </div>`;
            }).join('');

            return `<div class="meet-entry">
                <h3>${meet.name}</h3>
                <div class="meta">${meet.date} | ${meet.location}</div>
                <div class="events-grid">${eventsHtml}</div>
            </div>`;
        }).join('');
    }

    // ===== GO =====
    init();
    </script>
</body>
</html>
