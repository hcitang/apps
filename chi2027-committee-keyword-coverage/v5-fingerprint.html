<!doctype html><html><head><meta charset="utf-8"><title>Coverage · Fingerprint</title>
<link rel="stylesheet" href="shared.css">
<style>
  /* Domain-only: candidates × 17 categories. Plain table with a definite width
     (no auto-fill grid inside a flex item — see v4 history). */
  .hd{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .hd input[type=search]{flex:1;min-width:120px;padding:4px 7px;border:1px solid var(--line);border-radius:6px;font:inherit}
  .hd select{font:inherit;font-size:11px;padding:3px 5px;border:1px solid var(--line);border-radius:6px;background:#fff}
  .hd .note{font-size:11px;color:var(--muted)}
  .scroll{overflow:auto;max-height:calc(100vh - 150px);border:1px solid var(--line);border-radius:8px;background:#fff}
  table.fp{border-collapse:separate;border-spacing:0;font-size:11px}
  table.fp th,table.fp td{padding:0;text-align:center}
  /* sticky header row + sticky name column */
  table.fp thead th{position:sticky;top:0;z-index:3;background:#fff;border-bottom:1px solid var(--line);
      vertical-align:bottom;cursor:pointer;user-select:none}
  table.fp thead th.namecol{left:0;z-index:4}
  table.fp th.cath{width:30px;height:118px;padding:0 2px 6px}
  table.fp th.cath .lbl{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;
      font-weight:600;font-size:10.5px;line-height:1;max-height:104px;overflow:hidden;display:inline-block}
  table.fp th.cath.sorted .lbl{color:var(--ink);text-decoration:underline}
  table.fp th.cath small{display:block;color:var(--muted);font-weight:400;font-size:8.5px}
  .namecol{position:sticky;left:0;z-index:2;background:#fff;border-right:1px solid var(--line);
      width:230px;min-width:230px;max-width:230px;text-align:left!important}
  tbody tr:hover .namecol{background:#f6f9ff}
  tbody td{border-bottom:1px solid #f3f4f6}
  /* group bands (cluster-by-home sort) */
  tr.band td{background:#eef0f3;border-top:1px solid var(--line);border-bottom:1px solid var(--line);height:22px}
  tr.band .bandname{position:sticky;left:0;z-index:2;background:#eef0f3;font-weight:700;font-size:11px;
      color:#374151;padding:3px 8px;text-align:left!important}
  tr.band .bandname .cnt{color:var(--muted);font-weight:600;font-size:10px;margin-left:4px}
  tr.band .bandname .avg{color:var(--piled);font-weight:600;font-size:9.5px;margin-left:6px}
  .vrow .namecol{cursor:pointer;padding:5px 8px}
  .nmline{display:flex;gap:7px;align-items:center}
  .nmline .nm{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:8.5px;font-weight:700;padding:1px 4px;border-radius:999px;background:#eef;color:#334}
  .badge.SC{background:#dcfce7;color:#166534}.badge.AC{background:#e0e7ff;color:#3730a3}.badge.ERB{background:#fee2e2;color:#991b1b}
  .sub{font-size:9.5px;color:var(--muted);margin-top:1px;display:flex;gap:6px;align-items:center}
  .chip{background:#eef2ff;color:#3730a3;border-radius:999px;padding:0 5px;font-weight:600}
  .cellbox{width:30px;height:30px;display:flex;align-items:center;justify-content:center;position:relative}
  .cellbox .pct{font-size:9px;color:#1f2430;font-weight:700}
  .cellbox .n{position:absolute;right:1px;bottom:0;font-size:7.5px;color:#6b7280;font-weight:700}
  .cellbox.lit{outline:2px solid var(--ink);outline-offset:-2px}
  td.catcell{cursor:default}
  td.catcell:hover .cellbox{outline:1px solid var(--ink);outline-offset:-2px}
  /* expand detail row */
  .detail{background:#fcfcfd}
  .detail td{padding:8px 12px;text-align:left;border-bottom:2px solid var(--line)}
  .detgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
  .catrow{border:1px solid var(--line);border-radius:6px;padding:5px 7px}
  .catrow .top{display:flex;justify-content:space-between;font-weight:600;font-size:11px}
  .catrow .meter{height:6px;background:#eef0f3;border-radius:4px;margin:3px 0;overflow:hidden}
  .catrow .meter i{display:block;height:100%;background:var(--piled)}
  .catrow .meta{font-size:9.5px;color:var(--muted)}
  .catrow .pills{margin-top:3px;display:flex;flex-wrap:wrap;gap:3px}
  .spill{font-size:9.5px;border:1px solid var(--line);border-radius:999px;padding:0 5px}
  .spill .rk{font-weight:700}.spill .R{color:#166534}.spill .K{color:#9a6700}
  .empty-cell{color:#d0d5db}
  .nodom{font-size:9.5px;color:var(--thin);font-weight:600}
</style></head><body>
<main></main>
<script src="data.js"></script><script src="core.js"></script><script src="committees.js"></script><script src="shared-ui.js"></script>
<script>
const C=window.CoverageCore, UI=window.CoverageUI;
UI.ensureConfirmedDefault(); UI.renderHeader("v5", render);

// ---- view state ----
let query="", who="all", rowSort="surname", sortCat=null, sortDir=-1;
let expanded=new Set();   // candidate ids with detail open

// ---- category meta (Domain only), fixed column order by demand desc ----
const CATS=(function(){
  const m=new Map();
  for(const sp of C.SUBPILES.Domain){
    const e=m.get(sp.category)||{label:sp.category,subpileCount:0,demandTotal:0};
    e.subpileCount++; e.demandTotal+=sp.demand; m.set(sp.category,e);
  }
  return [...m.values()].sort((a,b)=>b.demandTotal-a.demandTotal);
})();
const CAT_ABBR=c=>c.replace(/\s*&\s*/g," & ").replace(/\(XR\)/,"").trim();

function surname(v){ const t=(v.name||v.id||"").trim().split(/\s+/); return (t[t.length-1]||"").toLowerCase(); }
function cmpName(a,b){ return surname(a).localeCompare(surname(b))||(a.name||"").localeCompare(b.name||""); }

// per-candidate Domain fingerprint: concentration (default), breadth, demandCover per category
function fingerprint(v, wK){
  const best={};   // key -> {cat, sub, level, demand}
  for(const c of v.cells){
    if(c.facet!=="Domain") continue;
    const k=C.KEY(c.category,c.subpile);
    if(best[k] && best[k].level==="R") continue;       // R beats K
    best[k]={cat:c.category, sub:c.subpile, level:c.level};
  }
  // attach demand from the tree
  const demOf={}; for(const sp of C.SUBPILES.Domain) demOf[sp.key]=sp.demand;
  const per=new Map(CATS.map(c=>[c.label,{catW:0,n:0,demW:0,subs:[]}]));
  let totalW=0;
  for(const k in best){
    const b=best[k]; const w=b.level==="R"?1:wK; const e=per.get(b.cat); if(!e) continue;
    e.catW+=w; e.n++; e.demW+=(demOf[k]||0)*w; e.subs.push(b);
    totalW+=w;
  }
  const out=CATS.map(c=>{
    const e=per.get(c.label);
    return { cat:c.label,
      concentration: totalW? e.catW/totalW : 0,
      breadth: c.subpileCount? e.n/c.subpileCount : 0,
      demandCover: c.demandTotal? e.demW/c.demandTotal : 0,
      n:e.n, subs:e.subs };
  });
  return { totalW, byCat:new Map(out.map(o=>[o.cat,o])), ranked:out.filter(o=>o.n).sort((a,b)=>b.concentration-a.concentration) };
}

function render(){
  const main=document.querySelector("main"); main.innerHTML="";
  const pool=UI.getPool();
  if(!pool.length){ main.innerHTML='<div class="empty-note">Load the volunteer CSV, or pick a sample committee from the toolbar.</div>'; return; }
  const confirmed=UI.getConfirmed();
  const wK=UI.computeOpts().w.K;   // 1 (K=R) or 0.5 (R>K)

  // filter people
  let people=pool.filter(v=>{
    if(who==="confirmed"&&!confirmed.has(v.id)) return false;
    if(who==="unconfirmed"&&confirmed.has(v.id)) return false;
    if(query){ const q=query.toLowerCase(); if(!(v.name||"").toLowerCase().includes(q)&&!v.role.toLowerCase().includes(q)) return false; }
    return true;
  });
  // compute fingerprints
  const fp=new Map(people.map(v=>[v.id, fingerprint(v,wK)]));

  // sort / group rows. clusterByHome groups people under their argmax category,
  // groups in demand order, people within a group by home concentration (most centered first).
  let groups=null;
  if(sortCat){
    people.sort((a,b)=>{ const av=fp.get(a.id).byCat.get(sortCat).concentration, bv=fp.get(b.id).byCat.get(sortCat).concentration;
      return (bv-av)*(sortDir<0?1:-1) || cmpName(a,b); });
  } else if(rowSort==="cluster"){
    groups=clusterByHome(people,fp);
    people=groups.flatMap(g=>g.people);   // keep flat list consistent for any later use
  } else people.sort(cmpName);

  // ---- toolbar ----
  const hd=document.createElement("div"); hd.className="hd";
  hd.innerHTML=
    `<b style="font-size:12px">Candidate → category</b>`+
    `<input type="search" placeholder="filter ${pool.length} people" value="${esc(query)}">`+
    `<select id="who">`+opt("all","everyone",who)+opt("confirmed","confirmed only",who)+opt("unconfirmed","not confirmed",who)+`</select>`+
    `<select id="rsort">`+opt("surname","sort: surname",rowSort)+opt("cluster","group: home category",rowSort)+`</select>`+
    `<span class="note">cell = % of this person's Domain keywords in that category (small # = how many subpiles back it). Click a column to rank · click a name to expand.</span>`;
  main.appendChild(hd);

  // ---- table ----
  const wrap=document.createElement("div"); wrap.className="scroll";
  const t=document.createElement("table"); t.className="fp";
  // header
  let thead=`<thead><tr><th class="namecol" title="sort by surname">${people.length} people</th>`;
  for(const c of CATS){
    thead+=`<th class="cath ${sortCat===c.label?'sorted':''}" data-cat="${esc(c.label)}" title="${esc(c.label)} — ${c.subpileCount} subpiles, demand ${c.demandTotal}. Click to rank candidates here.">`+
      `<span class="lbl">${esc(CAT_ABBR(c.label))}</span><small>d${c.demandTotal}</small></th>`;
  }
  thead+=`</tr></thead>`;
  // body
  const rowHtml=(v)=>{
    const f=fp.get(v.id); const top=f.ranked[0];
    let s=`<tr class="vrow" data-id="${esc(v.id)}"><td class="namecol">`+
        `<div class="nmline"><span class="head" style="${C.headStyle(v.head,22)}"></span>`+
        `<span class="nm">${esc(v.name||v.id)}</span>`+
        `<span class="badges">${v.roles.map(r=>`<span class="badge ${esc(r)}">${esc(r)}</span>`).join("")}</span></div>`+
        `<div class="sub">`+ (top? `<span class="chip">${esc(CAT_ABBR(top.cat))} ${pct(top.concentration)}</span>`:`<span class="nodom">no Domain keywords</span>`)+
        `<span>${f.totalW? f.totalW+" kw":""}</span></div></td>`;
    for(const c of CATS){
      const o=f.byCat.get(c.label);
      if(o.n){
        const a=0.12+0.88*Math.min(1,o.concentration);   // opacity ramp
        s+=`<td class="catcell"><div class="cellbox" style="background:rgba(91,63,181,${a.toFixed(3)})" `+
            `title="${esc(c.label)} · ${pct(o.concentration)} of their keywords · ${o.n}/${c.subpileCount} subpiles · covers ${pct(o.demandCover)} of demand\n${o.subs.map(s=>s.sub+' ['+s.level+']').join(', ')}">`+
            `<span class="pct"${o.concentration<0.18?' style="color:#1f2430"':' style="color:#fff"'}>${Math.round(o.concentration*100)}</span><span class="n">${o.n}</span></div></td>`;
      } else s+=`<td class="catcell"><div class="cellbox empty-cell">·</div></td>`;
    }
    s+=`</tr>`;
    if(expanded.has(v.id)) s+=detailRow(v,f);
    return s;
  };
  let tb="<tbody>";
  if(groups){
    for(const g of groups){
      const avg=g.people.reduce((s,v)=>s+(fp.get(v.id).ranked[0]?fp.get(v.id).ranked[0].concentration:0),0)/g.people.length;
      const name=g.cat? esc(g.cat) : "— no Domain keywords —";
      tb+=`<tr class="band"><td class="namecol bandname">${name}<span class="cnt">${g.people.length}</span>`+
          (g.cat?`<span class="avg">avg ${pct(avg)}</span>`:``)+`</td><td colspan="${CATS.length}"></td></tr>`;
      for(const v of g.people) tb+=rowHtml(v);
    }
  } else {
    for(const v of people) tb+=rowHtml(v);
  }
  tb+="</tbody>";
  t.innerHTML=thead+tb; wrap.appendChild(t); main.appendChild(wrap);

  // events
  hd.querySelector("input").oninput=e=>{ query=e.target.value; render(); };
  hd.querySelector("#who").onchange=e=>{ who=e.target.value; render(); };
  hd.querySelector("#rsort").onchange=e=>{ rowSort=e.target.value; sortCat=null; render(); };
  t.querySelector("th.namecol").onclick=()=>{ sortCat=null; rowSort="surname"; render(); };
  t.querySelectorAll("th.cath").forEach(th=>th.onclick=()=>{ const c=th.dataset.cat;
    if(sortCat===c) sortDir*=-1; else { sortCat=c; sortDir=-1; } render(); });
  t.querySelectorAll("tr.vrow .namecol").forEach(td=>td.onclick=()=>{ const id=td.closest("tr").dataset.id;
    expanded.has(id)?expanded.delete(id):expanded.add(id); render(); });
}

function detailRow(v,f){
  const cells=f.ranked.length? f.ranked.map(o=>{
    return `<div class="catrow"><div class="top"><span>${esc(o.cat)}</span><span>${pct(o.concentration)}</span></div>`+
      `<div class="meter"><i style="width:${Math.round(o.concentration*100)}%"></i></div>`+
      `<div class="meta">${o.n}/${catSub(o.cat)} subpiles · covers ${pct(o.demandCover)} of demand · breadth ${pct(o.breadth)}</div>`+
      `<div class="pills">${o.subs.map(s=>`<span class="spill">${esc(s.sub)} <span class="rk ${s.level}">${s.level}</span></span>`).join("")}</div></div>`;
  }).join("") : `<span class="nodom">No Domain keywords selected — this person can't be placed in a Domain category.</span>`;
  return `<tr class="detail"><td class="namecol" style="background:#fcfcfd"></td><td colspan="${CATS.length}"><div class="detgrid">${cells}</div></td></tr>`;
}
// group people by their home (argmax) category; groups in demand order,
// people within a group most-centered (highest home concentration) first.
function clusterByHome(people,fp){
  const byCat=new Map(CATS.map(c=>[c.label,[]])); const none=[];
  for(const v of people){ const r=fp.get(v.id).ranked[0]; (r?byCat.get(r.cat):none).push(v); }
  for(const arr of byCat.values())
    arr.sort((a,b)=> fp.get(b.id).ranked[0].concentration - fp.get(a.id).ranked[0].concentration || cmpName(a,b));
  none.sort(cmpName);
  const groups=[];
  for(const c of CATS){ const arr=byCat.get(c.label); if(arr.length) groups.push({cat:c.label,people:arr}); }
  if(none.length) groups.push({cat:null,people:none});
  return groups;
}
function catSub(label){ const c=CATS.find(x=>x.label===label); return c?c.subpileCount:0; }
function pct(x){ return Math.round(x*100)+"%"; }
function opt(val,label,cur){ return `<option value="${val}"${val===cur?" selected":""}>${label}</option>`; }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
render();
</script></body></html>
