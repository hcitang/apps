<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DIS 2026 Schedule</title>
<style>
  :root {
    --bg:       #f8f7f2;
    --ink:      #2a2a30;
    --muted:    #8a8a90;
    --line:     #d4d2ca;
    --slot-bg:  #ffffff;
    --sensitive-tag: #b0506a;
    --search-match:  #6aa5e0;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0; padding: 20px 24px;
    font-size: 13px;
  }
  h1 { margin: 0 0 6px; font-size: 20px; }
  .summary { margin-bottom: 12px; color: var(--muted); font-size: 12px; }
  .summary a { color: var(--ink); }
  #validation { background: #ffe0d0; color: #7a2a00; padding: 8px 12px;
                border-radius: 6px; margin: 10px 0; display: none; }

  #controls {
    display: flex; gap: 10px; align-items: center; margin-bottom: 14px;
  }
  #searchbox {
    padding: 7px 12px; border: 1px solid var(--line); border-radius: 18px;
    flex: 1; max-width: 500px; font-size: 13px; background: #fff; outline: none;
  }
  #searchbox:focus { border-color: var(--search-match); }
  #searchclear {
    padding: 5px 10px; border: 1px solid var(--line); border-radius: 14px;
    background: #fff; cursor: pointer; font-size: 11px; color: var(--muted);
  }

  #layout { display: flex; gap: 16px; align-items: flex-start; }
  #grid { flex: 1; min-width: 0; }
  #detail {
    width: 360px; flex-shrink: 0;
    position: sticky; top: 20px;
    max-height: calc(100vh - 40px); overflow-y: auto;
    background: #fff;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 16px;
  }
  #detail .empty {
    color: var(--muted); font-style: italic; text-align: center;
    padding: 40px 0;
  }
  #detail h2 { margin: 0 0 6px; font-size: 15px; }
  #detail .sub { color: var(--muted); font-size: 11px; margin-bottom: 12px; }
  #detail .paper {
    background: #f7f5f0; padding: 8px 10px; margin: 6px 0;
    border-radius: 4px; font-size: 12px; line-height: 1.35;
    border-left: 3px solid transparent;
  }
  #detail .paper.match {
    border-left-color: var(--search-match);
    background: #eaf3ff;
  }
  #detail .paper .pid { color: var(--muted); font-size: 10px; }
  #detail .paper .title { font-weight: 500; margin-top: 1px; }
  #detail .paper .authors { color: var(--muted); font-size: 11px; margin-top: 3px; }

  .day-grid {
    display: grid;
    grid-template-columns: 92px repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 14px;
  }
  .day-header {
    grid-column: 1 / -1;
    font-size: 14px; font-weight: 600;
    padding: 6px 0 2px;
    border-bottom: 1px solid var(--line);
  }
  .col-header {
    font-size: 11px; color: var(--muted); font-weight: 500;
    padding: 3px 6px; text-align: center;
  }
  .slot-label {
    padding: 6px;
    font-size: 11px; color: var(--muted);
    border-right: 1px solid var(--line);
  }
  .slot-label .time { font-weight: 500; color: var(--ink); }

  .cell {
    background: var(--slot-bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 8px;
    cursor: pointer;
    min-height: 58px;
    position: relative;
    overflow: hidden;
    transition: background 0.12s;
  }
  .cell:hover { border-color: var(--ink); }
  .cell.selected { outline: 2px solid var(--ink); outline-offset: -2px; }
  .cell.search-match { box-shadow: inset 0 0 0 3px var(--search-match); }
  .cell .sid { font-size: 10px; color: var(--muted); }
  .cell .name { font-size: 12px; font-weight: 500; margin-top: 2px; line-height: 1.2; }
  .cell .count { font-size: 10px; color: var(--muted); margin-top: 6px; }
  .cell .sensitive {
    position: absolute; top: 4px; right: 6px;
    color: var(--sensitive-tag); font-size: 11px;
  }
  .cell.empty { background: #eee; border-style: dashed; color: var(--muted); }
  .cell.industry {
    background: #f4ece0; border-style: dashed;
    font-style: italic; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<h1>DIS 2026 Schedule</h1>
<div class="summary" id="summary">Loading…</div>
<div id="validation"></div>

<div id="controls">
  <input id="searchbox" placeholder="Search papers — title or author…" />
  <div id="searchclear" title="Clear search">×</div>
</div>

<div id="layout">
  <div id="grid"></div>
  <aside id="detail"><div class="empty">Click any session cell to see the papers inside.</div></aside>
</div>

<script>
const DAYS = ['Mon','Tue','Wed'];
const DAY_LABEL = {Mon:"Monday 15 Jun", Tue:"Tuesday 16 Jun", Wed:"Wednesday 17 Jun"};
const SLOT_TIMES = {
  Mon: ['11:00-12:30','14:00-15:30','16:00-17:30'],
  Tue: ['09:00-10:30','11:00-12:30','14:00-15:30','16:00-17:30'],
  Wed: ['09:00-10:30','11:00-12:30','14:00-15:30'],
};
const SLOT_CAPS = {Mon:[5,5,4], Tue:[5,5,5,4], Wed:[5,5,5]};

let sched, sessions, items;
let sessionById = {};
let itemById = {};
let selectedSessionId = null;
let searchTerm = '';
let searchMatchingSids = new Set();
let searchMatchingPids = new Set();

async function loadAll() {
  [sched, sessions, items] = await Promise.all([
    fetch('schedule.json').then(r=>r.json()),
    fetch('sessions_min6.json').then(r=>r.json()),
    fetch('items_min6.json').then(r=>r.json()),
  ]);
  for (const s of sessions.sessions) sessionById[s.id] = s;
  for (const it of items) itemById[it.id] = it;
  validate();
  renderSummary();
  renderGrid();
  renderDetail();
  wireSearch();
}

function validate() {
  if (sched.assignments.length !== 48) {
    document.getElementById('validation').style.display = 'block';
    document.getElementById('validation').textContent =
      `Expected 48 assignments, got ${sched.assignments.length}`;
  }
}

function renderSummary() {
  document.getElementById('summary').innerHTML =
    `48 sessions across 3 days · ` +
    `<span style="color:var(--muted)">` +
    `<a href="schedule-personas.html">persona view</a> · ` +
    `<a href="personas.html">persona list</a></span>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (const day of DAYS) {
    const dg = document.createElement('div');
    dg.className = 'day-grid';
    dg.innerHTML = `<div class="day-header">${DAY_LABEL[day]}</div><div class="col-header"></div>` +
      [0,1,2,3,4].map(r => `<div class="col-header">Room ${r+1}</div>`).join('');
    SLOT_TIMES[day].forEach((t, slot) => {
      const sl = document.createElement('div');
      sl.className = 'slot-label';
      sl.innerHTML = `<div class="time">${t}</div><div>Slot ${slot+1}</div>`;
      dg.appendChild(sl);
      for (let r=0;r<5;r++) {
        const cap = SLOT_CAPS[day][slot];
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (r >= cap) {
          if (slot === SLOT_CAPS[day].length-1 && r === 4 && day !== 'Wed') {
            cell.classList.add('industry');
            cell.textContent = 'Industry';
          } else {
            cell.classList.add('empty');
            cell.textContent = '—';
          }
        } else {
          const a = sched.assignments.find(x => x.day===day && x.slot===slot && x.room===r);
          if (!a) { cell.classList.add('empty'); cell.textContent='—'; }
          else {
            const s = sessionById[a.session_id];
            const sensitive = !s.quirky_name;
            cell.innerHTML = `
              <div class="sid">S${s.id}</div>
              <div class="name">${s.name}</div>
              <div class="count">${(s.items||[]).length} items</div>
              ${sensitive ? '<div class="sensitive" title="Sensitive">●</div>' : ''}`;
            cell.dataset.sid = s.id;
            cell.onclick = () => { selectedSessionId = s.id; renderDetail(); updateSearchOverlay(); };
          }
        }
        dg.appendChild(cell);
      }
    });
    grid.appendChild(dg);
  }
  updateSearchOverlay();
}

function updateSearchOverlay() {
  const cells = document.querySelectorAll('.cell[data-sid]');
  cells.forEach(c => {
    c.classList.remove('search-match', 'selected');
    const sid = parseInt(c.dataset.sid);
    if (selectedSessionId === sid) c.classList.add('selected');
    if (searchTerm && searchMatchingSids.has(sid)) c.classList.add('search-match');
  });
}

function wireSearch() {
  const box = document.getElementById('searchbox');
  const clear = document.getElementById('searchclear');
  box.addEventListener('input', () => { searchTerm = box.value.trim().toLowerCase(); runSearch(); });
  clear.addEventListener('click', () => { box.value = ''; searchTerm = ''; runSearch(); });
}

function runSearch() {
  searchMatchingSids = new Set(); searchMatchingPids = new Set();
  if (searchTerm) {
    for (const it of items) {
      if ((it.title||'').toLowerCase().includes(searchTerm) ||
          (it.authors||'').toLowerCase().includes(searchTerm) ||
          (it.id||'').toLowerCase().includes(searchTerm)) {
        searchMatchingSids.add(it.session); searchMatchingPids.add(it.id);
      }
    }
  }
  updateSearchOverlay(); renderDetail();
}

function renderDetail() {
  const el = document.getElementById('detail');
  if (selectedSessionId == null) {
    el.innerHTML = '<div class="empty">Click any session cell to see the papers inside.</div>';
    return;
  }
  const sid = selectedSessionId;
  const s = sessionById[sid];
  const papers = (s.items || []).map(iid => itemById[iid]).filter(Boolean);
  const sensitive = !s.quirky_name;
  const head = `
    <h2>S${sid} — ${s.name}</h2>
    <div class="sub">
      ${sensitive ? '⚠ sensitive topic · ' : (s.quirky_name ? `aka "${s.quirky_name}" · ` : '')}
      ${papers.length} items
    </div>`;
  const paperHtml = papers.map((p, i) => {
    const matchClass = searchMatchingPids.has(p.id) ? ' match' : '';
    return `
      <div class="paper${matchClass}">
        <div class="pid">#${i+1} · ${p.id}</div>
        <div class="title">${p.title}</div>
        <div class="authors">${p.authors}</div>
      </div>`;
  }).join('');
  el.innerHTML = head + paperHtml;
}

loadAll().catch(e => {
  document.getElementById('validation').style.display = 'block';
  document.getElementById('validation').textContent = 'Load error: ' + e;
});
</script>
</body>
</html>
