<html lang="en">
<head>
<meta charset="utf-8">
<title>[DRAFT] Keyword Map · v6 treemap + leaves</title>
<style>
  :root {
    --bg: #fafbfc;
    --ink: #1f2328;
    --muted: #57606a;
    --line: #d0d7de;
    --card: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--ink);
    font: 12px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body { display: flex; flex-direction: column; }

  header {
    flex: 0 0 auto;
    display: flex; align-items: baseline; gap: 12px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    background: #fff;
    height: 36px;
  }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 11px; }
  header .search { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  header input[type=search] {
    width: 240px; padding: 4px 8px;
    border: 1px solid var(--line); border-radius: 6px;
    font-size: 12px; font-family: inherit;
  }
  header input[type=search]:focus { outline: none; border-color: #8b949e; }
  header .hits { color: var(--muted); font-size: 11px; min-width: 70px; }

  #map { flex: 1 1 auto; position: relative; overflow: hidden; }
  #map svg { display: block; width: 100%; height: 100%; }

  .pile-rect { transition: opacity 120ms ease; }
  .subpile-rect {
    stroke: #ffffff;
    stroke-width: 1px;
    transition: stroke-width 80ms ease;
  }
  .subpile-rect.hit { stroke-width: 2.5px; }

  .leaf-rect {
    fill: rgba(255,255,255,0.0);
    stroke: rgba(255,255,255,0.18);
    stroke-width: 0.5px;
    transition: fill 100ms ease, stroke 100ms ease;
  }
  .leaf-rect.hit {
    fill: #fff3a8;
    stroke: #b08800;
    stroke-width: 1px;
  }

  .pile-label {
    fill: #ffffff;
    font-weight: 600;
    pointer-events: none;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.25);
    stroke-width: 0.6px;
  }
  .subpile-label {
    fill: #ffffff;
    font-weight: 600;
    pointer-events: none;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.4);
    stroke-width: 0.5px;
  }
  .subpile-label .n { opacity: 0.85; font-weight: 400; }

  .leaf-label {
    fill: rgba(255,255,255,0.82);
    font-weight: 400;
    pointer-events: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .leaf-label.hit {
    fill: #1f2328;
    font-weight: 700;
  }

  body.searching .leaf-label:not(.hit) { fill: rgba(255,255,255,0.18); }
  body.searching .subpile-rect:not(.hit) { opacity: 0.45; }
  body.searching .pile-rect.dim { opacity: 0.15; }
  body.searching .pile-label.dim { opacity: 0.25; }

  #tooltip {
    position: absolute;
    pointer-events: none;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    padding: 6px 8px;
    font-size: 11px;
    color: var(--ink);
    max-width: 280px;
    z-index: 20;
    display: none;
  }
  #tooltip .tt-path { color: var(--muted); font-size: 10px; margin-bottom: 3px; }
  #tooltip .tt-title { font-weight: 600; margin-bottom: 4px; }
  #tooltip .tt-leaf {
    display: flex; gap: 6px;
    font-size: 10.5px;
    line-height: 1.45;
  }
  #tooltip .tt-leaf .ln {
    margin-left: auto;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  #tooltip .tt-leaf mark { background: #fff3a8; padding: 0 1px; border-radius: 2px; }
</style>

//   sub-pile = second level (e.g. "Generative AI")

  "Critical, Civic & Sustainable Computing": "#9a6700",
  "Input & Interaction Modalities":       "#0550ae",
  "[Facet] Method / Approach":            "#24292f",
  "[Facet] Users":                        "#24292f",
  "[Facet] Primary Contribution":         "#24292f",
  "Uncategorized / Tony to triage":       "#57606a",
};

function colorFor(pileName) {
  return PILE_COLORS[pileName] || "#57606a";
}

// Facet tagging — used by the visibility controls. Order here is the canonical
// order for the toggle UI.
const FACETS = [
  { key: "domain",       label: "Domain" },
  { key: "method",       label: "Method / Approach" },
  { key: "users",        label: "Users" },
  { key: "contribution", label: "Primary Contribution" },
];

function facetFor(pileName) {
  const n = pileName || "";
  if (/^Uncategorized|triage/i.test(n)) return "inbox";
  if (n === "[Facet] Method / Approach") return "method";
  if (n === "[Facet] Users")             return "users";
  if (n === "[Facet] Primary Contribution") return "contribution";
  return "domain";
}

async function loadBoard({ minLeaf = MIN_LEAF } = {}) {
  const res = await fetch("/api/board", { cache: "no-store" });
  if (!res.ok) throw new Error(`/api/board returned ${res.status}`);
  const board = await res.json();

  const piles = (board.categories || []).map((cat) => {
    const subpiles = (cat.subpiles || []).map((sp) => {
      const leaves = (sp.leaves || []).map((l) => ({
        cluster_id: l.cluster_id,
        canonical:  l.canonical,
        count:      l.total_count || 0,
        confidence: l.confidence,
        accepted:   !!l.accepted,
        visible:    (l.total_count || 0) >= minLeaf,
      }));
      const visibleLeaves = leaves.filter((l) => l.visible);
      const count = visibleLeaves.reduce((a, l) => a + l.count, 0);
      return {
        name:    sp.name,
        leaves,
        visibleLeafCount: visibleLeaves.length,
        totalLeafCount:   leaves.length,
        count,
      };
    });
    const count = subpiles.reduce((a, sp) => a + sp.count, 0);
    return {
      name: cat.name,
      color: colorFor(cat.name),
      facet: facetFor(cat.name),
      subpiles,
      count,
    };
  });

  const totals = {
    piles:    piles.length,
    subpiles: piles.reduce((a, p) => a + p.subpiles.length, 0),
    leaves:   piles.reduce((a, p) => a + p.subpiles.reduce((b, sp) => b + sp.visibleLeafCount, 0), 0),
    count:    piles.reduce((a, p) => a + p.count, 0),
  };

  return { piles, totals, minLeaf };
}

// Substring search across all leaves; returns flat list of hits with parent path.
function searchLeaves(model, query) {
  const q = (query || "").trim().toLowerCase();
  if (!q) return [];
  const hits = [];
  for (const pile of model.piles) {
    for (const sp of pile.subpiles) {
      for (const leaf of sp.leaves) {
        if (leaf.canonical.toLowerCase().includes(q)) {
          hits.push({ pile, subpile: sp, leaf });
        }
      }
    }
  }
  return hits;
}

// Return a shallow-filtered copy of the model that includes only the piles
// matching the given visibility options. Sub-piles / leaves are passed through.
// Totals are recomputed for the filtered subset.
function filterModel(model, opts = {}) {
  const showInbox = !!opts.showInbox;
  const facets    = new Set(opts.facets || FACETS.map((f) => f.key));
  const keep = (pile) => {
    if (pile.facet === "inbox") return showInbox;
    return facets.has(pile.facet);
  };
  const piles = model.piles.filter(keep);
  const totals = {
    piles:    piles.length,
    subpiles: piles.reduce((a, p) => a + p.subpiles.length, 0),
    leaves:   piles.reduce((a, p) => a + p.subpiles.reduce((b, sp) => b + sp.visibleLeafCount, 0), 0),
    count:    piles.reduce((a, p) => a + p.count, 0),
  };
  return { piles, totals, minLeaf: model.minLeaf };
}

window.KeywordMap = { loadBoard, searchLeaves, filterModel, colorFor, facetFor, FACETS, MIN_LEAF };

</script>
<script>
// Shared visibility-toggle controls for the keyword-map prototypes.
//
// Usage:
//   const state = KeywordMap.mountControls(containerEl, (state) => render(state));
//   render(state);  // initial render
//
// `state` shape:
//   { showInbox: bool, facets: ["domain","method","users","contribution"] }
//
// State persists across all keyword-map pages via localStorage under
// "keyword-map.controls". Defaults: inbox off, all four facets on.

(function () {
  const LS_KEY = "keyword-map.controls";

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        return {
          showInbox: !!s.showInbox,
          facets:    Array.isArray(s.facets) ? s.facets : KeywordMap.FACETS.map((f) => f.key),
        };
      }
    } catch (_) { /* ignore */ }
    return { showInbox: false, facets: KeywordMap.FACETS.map((f) => f.key) };
  }

  function saveState(state) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) { /* ignore */ }
  }

  const FACET_TIPS = {
    domain:       "What is the area of research?",
    method:       "What is the method or epistemological stance?",
    users:        "Does the work focus on or target a specific population?",
    contribution: "What is the primary contribution of the work?",
    inbox:        "Still to figure out where they belong.",
  };

  function mountControls(container, onChange) {
    const state = loadState();

    const wrap = document.createElement("span");
    wrap.className = "km-controls";
    wrap.innerHTML = `
      <style>
        .km-controls { display: inline-flex; align-items: center; gap: 10px; font-size: 11.5px; color: #57606a; }
        .km-controls label { display: inline-flex; align-items: center; gap: 3px; cursor: pointer; user-select: none; padding: 1px 6px; border: 1px solid transparent; border-radius: 10px; }
        .km-controls label:hover { background: #f3f4f6; }
        .km-controls input { margin: 0; accent-color: #0969da; }
        .km-controls .sep { color: #d0d7de; }
        .km-controls .group-label { color: #8b949e; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; margin-right: -4px; }
      </style>
      <span class="group-label">show</span>
      ${KeywordMap.FACETS.map((f) => `
        <label data-facet="${f.key}" title="${FACET_TIPS[f.key] || ""}">
          <input type="checkbox" data-facet="${f.key}" ${state.facets.includes(f.key) ? "checked" : ""}>
          ${f.label}
        </label>`).join("")}
      <span class="sep">·</span>
      <label data-facet="inbox" title="${FACET_TIPS.inbox}">
        <input type="checkbox" data-inbox ${state.showInbox ? "checked" : ""}>
        Inbox
      </label>
    `;
    container.appendChild(wrap);

    wrap.addEventListener("change", (e) => {
      const t = e.target;
      if (t.matches("input[data-inbox]")) {
        state.showInbox = t.checked;
      } else if (t.matches("input[data-facet]")) {
        const key = t.dataset.facet;
        const set = new Set(state.facets);
        if (t.checked) set.add(key); else set.delete(key);
        state.facets = KeywordMap.FACETS.map((f) => f.key).filter((k) => set.has(k));
      }
      saveState(state);
      onChange({ ...state, facets: [...state.facets] });
    });

    return { ...state, facets: [...state.facets] };
  }

  KeywordMap.mountControls = mountControls;
})();

</script>
<script>
(async function () {
  const fullModel = await KeywordMap.loadBoard();
  const svg = d3.select("#map svg");
  const tooltip = document.getElementById("tooltip");
  const mapEl = document.getElementById("map");
  const metaEl = document.getElementById("meta");
  const qEl = document.getElementById("q");
  const hitsEl = document.getElementById("hits");

  let model = fullModel;
  let currentHits = new Map();         // subpile -> [leaf,...]
  let currentPilesWithHits = new Set();
  let leafHitSet = new Set();          // leaf objects that match

  function shade(hex, amt) {
    const c = d3.color(hex);
    if (!c) return hex;
    return (amt < 0 ? c.darker(-amt * 1.4) : c.brighter(amt * 1.4)).formatHex();
  }
  function fmtN(n) { return n >= 1000 ? n.toLocaleString() : String(n); }
  function escape(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function buildRoot() {
    return {
      name: "root",
      children: model.piles.map((p) => ({
        name: p.name, color: p.color, pile: p,
        children: p.subpiles.map((sp) => ({
          name: sp.name, subpile: sp, pile: p,
          // For sub-pile sum we floor at 1 so empties still render
          children: (() => {
            const vis = sp.leaves.filter((l) => l.visible);
            if (vis.length === 0) {
              return [{ leaf: null, subpile: sp, pile: p, value: 1, placeholder: true }];
            }
            return vis.map((l) => ({ leaf: l, subpile: sp, pile: p, value: Math.max(l.count, 1) }));
          })(),
        })),
      })),
    };
  }

  function layout() {
    const w = mapEl.clientWidth;
    const h = mapEl.clientHeight;
    svg.attr("viewBox", `0 0 ${w} ${h}`).attr("width", w).attr("height", h);

    const hierarchy = d3.hierarchy(buildRoot())
      .sum((d) => d.value || 0)
      .sort((a, b) => b.value - a.value);

    // Three-level treemap. paddingTop reserves a strip for labels at each level.
    d3.treemap()
      .tile(d3.treemapSquarify)
      .size([w, h])
      .paddingOuter(2)
      .paddingTop((d) => {
        if (d.depth === 0) return 0;
        if (d.depth === 1) return 18;  // pile header strip
        if (d.depth === 2) return 13;  // sub-pile header strip
        return 0;
      })
      .paddingInner(1)
      .round(true)
      (hierarchy);

    draw(hierarchy);
  }

  function draw(hierarchy) {
    svg.selectAll("*").remove();

    const pileNodes = hierarchy.children || [];

    const pile = svg.selectAll("g.pile")
      .data(pileNodes)
      .join("g")
      .attr("class", "pile")
      .attr("transform", (d) => `translate(${d.x0},${d.y0})`);

    pile.append("rect")
      .attr("class", "pile-rect")
      .attr("width", (d) => Math.max(0, d.x1 - d.x0))
      .attr("height", (d) => Math.max(0, d.y1 - d.y0))
      .attr("fill", (d) => d.data.color)
      .attr("fill-opacity", 0.92)
      .attr("stroke", "#ffffff")
      .attr("stroke-width", 1);

    pile.append("text")
      .attr("class", "pile-label")
      .attr("x", 6).attr("y", 12)
      .attr("font-size", 11)
      .each(function (d) {
        const w = d.x1 - d.x0;
        if (w < 60) { d3.select(this).remove(); return; }
        const label = `${d.data.name}  (${fmtN(d.data.pile.count)})`;
        const maxChars = Math.max(4, Math.floor((w - 10) / 5.6));
        d3.select(this).text(label.length > maxChars ? label.slice(0, maxChars - 1) + "…" : label);
      });

    // sub-piles
    const sp = pile.selectAll("g.subpile")
      .data((d) => d.children || [])
      .join("g")
      .attr("class", "subpile")
      .attr("transform", (d) => `translate(${d.x0 - d.parent.x0},${d.y0 - d.parent.y0})`);

    sp.append("rect")
      .attr("class", "subpile-rect")
      .attr("width", (d) => Math.max(0, d.x1 - d.x0))
      .attr("height", (d) => Math.max(0, d.y1 - d.y0))
      .attr("fill", (d) => shade(d.data.pile.color, -0.15))
      .attr("fill-opacity", 0.95)
      .on("mouseenter", function (event, d) { showTooltip(event, d); })
      .on("mousemove", function (event) { moveTooltip(event); })
      .on("mouseleave", hideTooltip);

    sp.append("text")
      .attr("class", "subpile-label")
      .attr("font-size", 9.5)
      .each(function (d) {
        const w = d.x1 - d.x0, h = d.y1 - d.y0;
        if (w < 38 || h < 13) return;
        const maxChars = Math.max(3, Math.floor((w - 6) / 4.8));
        const name = d.data.name;
        const label = name.length > maxChars ? name.slice(0, maxChars - 1) + "…" : name;
        d3.select(this).append("tspan").attr("x", 4).attr("y", 10).text(label);
        if (w >= 80) {
          d3.select(this).append("tspan").attr("class", "n")
            .attr("font-size", 8.5)
            .attr("dx", 4)
            .text(`(${fmtN(d.data.subpile.count)})`);
        }
      });

    // leaves
    const leaf = sp.selectAll("g.leaf")
      .data((d) => (d.children || []).filter((c) => !c.data.placeholder))
      .join("g")
      .attr("class", "leaf")
      .attr("transform", (d) => `translate(${d.x0 - d.parent.x0},${d.y0 - d.parent.y0})`);

    leaf.append("rect")
      .attr("class", "leaf-rect")
      .attr("width", (d) => Math.max(0, d.x1 - d.x0))
      .attr("height", (d) => Math.max(0, d.y1 - d.y0));

    leaf.append("text")
      .attr("class", "leaf-label")
      .each(function (d) {
        const w = d.x1 - d.x0, h = d.y1 - d.y0;
        if (w < 24 || h < 9) return;
        // pick a font size that fits the cell
        const fs = Math.max(7, Math.min(11, Math.floor(h * 0.55), Math.floor(w / 4.2)));
        const maxChars = Math.max(3, Math.floor((w - 4) / (fs * 0.5)));
        const c = d.data.leaf.canonical;
        const label = c.length > maxChars ? c.slice(0, maxChars - 1) + "…" : c;
        d3.select(this)
          .attr("font-size", fs)
          .attr("x", 2)
          .attr("y", fs + 1)
          .text(label);
      });

    applySearchVisuals();
  }

  function showTooltip(event, d) {
    const sp = d.data.subpile;
    const pile = d.data.pile;
    const q = qEl.value.trim().toLowerCase();
    const top = sp.leaves
      .filter((l) => l.visible)
      .sort((a, b) => {
        const am = q && a.canonical.toLowerCase().includes(q) ? 1 : 0;
        const bm = q && b.canonical.toLowerCase().includes(q) ? 1 : 0;
        if (am !== bm) return bm - am;
        return b.count - a.count;
      })
      .slice(0, 10);
    let html = `<div class="tt-path">${escape(pile.name)}</div>`;
    html += `<div class="tt-title">${escape(sp.name)} <span style="color:var(--muted); font-weight:400;">· ${fmtN(sp.count)} (${sp.visibleLeafCount} leaves)</span></div>`;
    if (top.length === 0) {
      html += `<div style="color:var(--muted)">no leaves at n≥${model.minLeaf}</div>`;
    } else {
      for (const l of top) {
        let canon = escape(l.canonical);
        if (q) canon = canon.replace(new RegExp(`(${escapeRegex(q)})`, "ig"), "<mark>$1</mark>");
        html += `<div class="tt-leaf"><span>${canon}</span><span class="ln">${l.count}</span></div>`;
      }
      if (sp.visibleLeafCount > top.length) {
        html += `<div style="color:var(--muted); font-size:10px; margin-top:3px">+ ${sp.visibleLeafCount - top.length} more</div>`;
      }
    }
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    moveTooltip(event);
  }
  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  function moveTooltip(event) {
    const pad = 12;
    const rect = mapEl.getBoundingClientRect();
    let x = event.clientX - rect.left + pad;
    let y = event.clientY - rect.top + pad;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    if (x + tw > rect.width)  x = event.clientX - rect.left - tw - pad;
    if (y + th > rect.height) y = event.clientY - rect.top - th - pad;
    tooltip.style.left = `${x}px`;
    tooltip.style.top = `${y}px`;
  }
  function hideTooltip() { tooltip.style.display = "none"; }

  // ---------- Search ----------
  let debounceTimer = null;
  qEl.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runSearch, 80);
  });

  function runSearch() {
    const q = qEl.value.trim();
    currentHits = new Map();
    currentPilesWithHits = new Set();
    leafHitSet = new Set();
    document.body.classList.toggle("searching", !!q);
    if (!q) {
      hitsEl.textContent = "";
      applySearchVisuals();
      return;
    }
    const hits = KeywordMap.searchLeaves(model, q);
    for (const h of hits) {
      if (!currentHits.has(h.subpile)) currentHits.set(h.subpile, []);
      currentHits.get(h.subpile).push(h.leaf);
      currentPilesWithHits.add(h.pile);
      leafHitSet.add(h.leaf);
    }
    hitsEl.textContent = `${hits.length} hit${hits.length === 1 ? "" : "s"}`;
    applySearchVisuals();
  }

  function applySearchVisuals() {
    const searching = qEl.value.trim().length > 0;
    svg.selectAll("g.pile").each(function (d) {
      const has = currentPilesWithHits.has(d.data.pile);
      d3.select(this).select("rect.pile-rect").classed("dim", searching && !has);
      d3.select(this).select("text.pile-label").classed("dim", searching && !has);
    });
    svg.selectAll("g.subpile").each(function (d) {
      const has = currentHits.has(d.data.subpile);
      d3.select(this).select("rect.subpile-rect").classed("hit", has);
    });
    svg.selectAll("g.leaf").each(function (d) {
      const hit = d.data.leaf && leafHitSet.has(d.data.leaf);
      d3.select(this).select("rect.leaf-rect").classed("hit", hit);
      d3.select(this).select("text.leaf-label").classed("hit", hit);
    });
  }

  // ---------- Controls ----------
  function render(state) {
    model = KeywordMap.filterModel(fullModel, state);
    metaEl.textContent = `${model.totals.piles} piles · ${model.totals.subpiles} sub-piles · ${model.totals.leaves.toLocaleString()} leaves (n≥${model.minLeaf}) · Σ ${model.totals.count.toLocaleString()}`;
    layout();
  }
  const initial = KeywordMap.mountControls(document.getElementById("controls"), render);
  render(initial);

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => render(initial), 80);
  });
})();
</script>
